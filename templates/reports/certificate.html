<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: A4 landscape;
            margin: 0;
        }
        body {
            font-family: 'Poppins', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9fafb;
        }
        .border-outer {
            padding: 40px;
            height: 100vh;
            box-sizing: border-box;
            background: #1A6B4A; /* Islamic Green */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .border-inner {
            background-color: white;
            padding: 60px;
            width: 100%;
            height: 100%;
            border: 15px double #D4AF37; /* Gold */
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }
        .pattern {
            position: absolute;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 2px solid #14532D;
            pointer-events: none;
            opacity: 0.1;
            /* Placeholder for geometric pattern */
        }
        h1 {
            color: #1A6B4A;
            font-size: 60px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .sub-header {
            font-size: 24px;
            color: #4B5563;
            margin-bottom: 40px;
        }
        .student-name {
            font-size: 48px;
            font-weight: bold;
            color: #111827;
            border-bottom: 2px solid #D4AF37;
            display: inline-block;
            padding: 0 40px;
            margin-bottom: 30px;
        }
        .achievement {
            font-size: 28px;
            color: #374151;
            line-height: 1.5;
            margin-bottom: 60px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 80px;
            padding: 0 100px;
        }
        .signature {
            border-top: 2px solid #D4AF37;
            padding-top: 10px;
            width: 250px;
            color: #1A6B4A;
            font-weight: bold;
        }
        .academy {
            font-size: 24px;
            color: #1A6B4A;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="border-outer">
        <div class="border-inner">
            <div class="pattern"></div>
            <div class="academy">{{ academy_name }}</div>
            <h1>Certificate</h1>
            <div class="sub-header">OF ACHIEVEMENT</div>
            <p style="margin-top: 40px; font-style: italic;">This is to certify that</p>
            <div class="student-name">{{ student_name }}</div>
            <div class="achievement">
                {{ achievement }}
            </div>
            <div class="footer">
                <div class="signature">
                    Teacher: {{ teacher_name }}
                </div>
                <div class="info">
                    Date: {{ date }}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
